<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#0F172A" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>
    <style>
      .page-bg { fill: #F6F8FB; }
      .card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; filter: url(#cardShadow); }
      .priority-card { fill: #FFFFFF; stroke: #BFDBFE; stroke-width: 1; filter: url(#cardShadow); }
      .primary { fill: #2563EB; }
      .primary-text { fill: #2563EB; }
      .secondary-text { fill: #64748B; }
      .body-text { fill: #111827; }
      .muted-fill { fill: #F8FAFC; }
      .input-fill { fill: #FBFDFF; }
      .border { stroke: #E2E8F0; stroke-width: 1; }
      .blue-soft { fill: #EFF6FF; }
      .green-soft { fill: #ECFDF5; }
      .warning-soft { fill: #FFFBEB; }
      .font { font-family: Inter, "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0; }
      .h1 { font-size: 24px; font-weight: 700; letter-spacing: 0; }
      .h2 { font-size: 16px; font-weight: 700; letter-spacing: 0; }
      .body { font-size: 15px; font-weight: 400; letter-spacing: 0; }
      .small { font-size: 13px; font-weight: 600; letter-spacing: 0; }
      .button { font-size: 15px; font-weight: 700; letter-spacing: 0; }
      .step { font-size: 22px; font-weight: 700; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="page-bg" width="1440" height="900"/>


<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Task Runner Dynamic Cover</title>
    <style>
      :root {
        --cover-bg: #f7f4ee;
        --surface: #fffaf2;
        --surface-soft: #fbf6ed;
        --text: #31281f;
        --muted: #887c6c;
        --line: #ead9bf;
        --brand: #b96513;
        --brand-dark: #9e520d;
        --shadow: 0 28px 80px rgba(116, 77, 34, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ebe6dc;
        color: var(--text);
        font-family:
          "PingFang SC",
          "Microsoft YaHei",
          "Noto Sans CJK SC",
          system-ui,
          sans-serif;
      }

      .portfolio-cover {
        width: min(1120px, 94vw);
        aspect-ratio: 16 / 9;
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        background:
          radial-gradient(circle at 84% 12%, rgba(185, 101, 19, 0.12), transparent 26%),
          linear-gradient(135deg, #f9f6ef 0%, var(--cover-bg) 52%, #efe8db 100%);
        box-shadow: 0 34px 90px rgba(61, 44, 24, 0.16);
        isolation: isolate;
      }

      .portfolio-cover::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.22;
        background-image:
          linear-gradient(rgba(111, 82, 45, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(111, 82, 45, 0.08) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: linear-gradient(90deg, transparent, #000 20%, #000 76%, transparent);
        z-index: -1;
      }

      .cover-chrome {
        position: absolute;
        inset: 8.2% 7.5%;
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(420px, 1.15fr);
        gap: 5.2%;
        align-items: center;
      }

      .project-copy {
        padding-left: 1%;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--brand);
        font-size: clamp(12px, 1.28vw, 15px);
        font-weight: 800;
        letter-spacing: 0;
      }

      .eyebrow::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--brand);
        box-shadow: 0 0 0 7px rgba(185, 101, 19, 0.1);
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(38px, 5.2vw, 78px);
        line-height: 0.96;
        letter-spacing: 0;
        max-width: 9ch;
      }

      .tagline {
        max-width: 23em;
        margin: 0;
        color: #6f6253;
        font-size: clamp(15px, 1.55vw, 22px);
        line-height: 1.55;
        font-weight: 650;
      }

      .phone-stage {
        position: relative;
        align-self: stretch;
        display: grid;
        place-items: center;
        min-width: 0;
      }

      .phone-shadow {
        position: absolute;
        width: 72%;
        height: 74%;
        border-radius: 32px;
        background: rgba(116, 77, 34, 0.11);
        filter: blur(28px);
        transform: translate(3%, 5%);
      }

      .phone {
        width: min(390px, 100%);
        aspect-ratio: 390 / 640;
        max-height: 100%;
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        background: #fbfaf6;
        border: 1px solid rgba(93, 70, 45, 0.14);
        box-shadow: var(--shadow);
      }

      .phone::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.56);
        pointer-events: none;
      }

      .topbar {
        position: absolute;
        top: 4.2%;
        left: 8%;
        right: 8%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #7b7063;
        font-weight: 800;
        font-size: 15px;
      }

      .svg-icon {
        width: 18px;
        height: 18px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: 0 0 auto;
      }

      .back-icon {
        width: 22px;
        height: 22px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 26px;
        padding: 3px 9px;
        border: 1px solid #efd3a2;
        border-radius: 999px;
        background: rgba(255, 250, 240, 0.4);
        color: #6f6254;
        font-size: 12px;
        font-weight: 700;
      }

      .play-icon {
        width: 16px;
        height: 16px;
      }

      .task-title {
        position: absolute;
        top: 12.8%;
        left: 14%;
        right: 10%;
      }

      .task-title span {
        color: #9a9184;
        font-size: 13px;
        font-weight: 800;
      }

      .task-title strong {
        display: block;
        margin-top: 4px;
        color: #5b5046;
        font-size: 16px;
        line-height: 1.28;
      }

      .step-card {
        position: absolute;
        left: 6.5%;
        right: 6.5%;
        top: 22.4%;
        min-height: 53%;
        border-radius: 20px;
        border: 1px solid #efd8af;
        background: var(--surface);
        box-shadow: 0 18px 44px rgba(116, 71, 20, 0.09),
          0 4px 14px rgba(58, 42, 26, 0.05);
        padding: 6.6% 6.5%;
      }

      .step-head {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--brand);
        font-size: 17px;
        font-weight: 900;
      }

      .step-index {
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px solid #e8d9c4;
        color: #766c60;
        background: #fffcf6;
      }

      .phase-title {
        margin: 12px 0 16px;
        color: #655b50;
        font-size: 18px;
        font-weight: 900;
      }

      .rule {
        height: 1px;
        background: var(--line);
        margin-bottom: 20px;
      }

      .source {
        color: #857a6e;
        font-size: 13px;
        font-weight: 850;
      }

      .source em {
        font-style: normal;
        color: #a69b8e;
        margin-left: 6px;
      }

      .step-text {
        position: relative;
        min-height: 112px;
        margin-top: 14px;
        font-size: 25px;
        line-height: 1.45;
        font-weight: 950;
        letter-spacing: 0;
      }

      .step-text span {
        position: absolute;
        inset: 0;
      }

      .step-one {
        animation: stepOne 5s ease infinite;
      }

      .step-two {
        opacity: 0;
        animation: stepTwo 5s ease infinite;
      }

      .primary-button {
        position: relative;
        height: 48px;
        margin-top: 12px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        overflow: hidden;
        background: var(--brand);
        color: #fffaf1;
        font-size: 16px;
        font-weight: 900;
        box-shadow: 0 8px 18px rgba(170, 97, 22, 0.18);
      }

      .button-start,
      .button-complete,
      .button-next {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .button-start {
        animation: buttonStart 5s steps(1, end) infinite;
      }

      .button-complete {
        opacity: 0;
        animation: buttonComplete 5s steps(1, end) infinite;
      }

      .button-next {
        opacity: 0;
        animation: buttonNext 5s steps(1, end) infinite;
      }

      .progress {
        position: absolute;
        left: 8%;
        right: 8%;
        bottom: 4.6%;
        display: flex;
        justify-content: space-between;
        align-items: end;
        color: #9a9184;
        font-weight: 800;
      }

      .progress-left,
      .progress-right {
        display: inline-flex;
        align-items: flex-start;
        gap: 7px;
      }

      .progress-label {
        font-size: 12px;
        line-height: 1.2;
      }

      .progress-count {
        position: relative;
        display: block;
        min-width: 74px;
        margin-top: 2px;
        color: #9a9184;
        font-size: 14px;
        line-height: 1.2;
      }

      .count-zero,
      .count-one {
        position: absolute;
        left: 0;
        top: 0;
      }

      .count-zero {
        animation: countZero 5s steps(1, end) infinite;
      }

      .count-one {
        opacity: 0;
        color: var(--brand);
        animation: countOne 5s steps(1, end) infinite;
      }

      .progress-right {
        align-items: center;
        gap: 5px;
        padding-top: 17px;
        font-size: 12px;
        line-height: 1;
      }

      @keyframes stepOne {
        0%,
        52% {
          opacity: 1;
          transform: translateY(0);
        }
        62%,
        92% {
          opacity: 0;
          transform: translateY(-10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes stepTwo {
        0%,
        55% {
          opacity: 0;
          transform: translateY(12px);
        }
        66%,
        92% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(12px);
        }
      }

      @keyframes buttonStart {
        0%,
        19%,
        100% {
          opacity: 1;
        }
        20%,
        99% {
          opacity: 0;
        }
      }

      @keyframes buttonComplete {
        0%,
        19%,
        57%,
        100% {
          opacity: 0;
        }
        20%,
        56% {
          opacity: 1;
        }
      }

      @keyframes buttonNext {
        0%,
        56%,
        92%,
        100% {
          opacity: 0;
        }
        57%,
        91% {
          opacity: 1;
        }
      }

      @keyframes countZero {
        0%,
        55%,
        100% {
          opacity: 1;
        }
        56%,
        99% {
          opacity: 0;
        }
      }

      @keyframes countOne {
        0%,
        55%,
        100% {
          opacity: 0;
        }
        56%,
        91% {
          opacity: 1;
        }
      }

      @media (max-width: 760px) {
        .cover-chrome {
          inset: 7% 6%;
          grid-template-columns: 0.8fr 1.1fr;
          gap: 3%;
        }

        h1 {
          font-size: clamp(27px, 7vw, 46px);
        }

        .tagline {
          display: none;
        }

        .phone {
          border-radius: 24px;
        }

        .step-text {
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="portfolio-cover" aria-label="AI Task Runner 动态项目封面">
      <section class="cover-chrome">
        <div class="project-copy">
          <div class="eyebrow">PRODUCT / AI UX</div>
          <h1>AI Task Runner</h1>
          <p class="tagline">把“不知道怎么开始”转成当前可执行的一步，并在完成后继续推进。</p>
        </div>

        <div class="phone-stage">
          <div class="phone-shadow"></div>
          <div class="phone">
            <div class="topbar">
              <svg class="svg-icon back-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="m15 18-6-6 6-6" />
              </svg>
              <div class="status-pill">
                <svg class="svg-icon play-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M8 5v14l11-7-11-7Z" />
                </svg>
                <span>可执行</span>
              </div>
            </div>

            <div class="task-title">
              <span>当前任务</span>
              <strong>写一版作品集项目介绍</strong>
            </div>

            <article class="step-card">
              <div class="step-head">
                <span>当前行动</span>
                <span class="step-index">第 1 步</span>
              </div>
              <div class="phase-title">这一步已经可以开始</div>
              <div class="rule"></div>
              <div class="source">准备执行 <em>AI 已生成</em></div>
              <div class="step-text">
                <span class="step-one">先用 2 句话写出这个项目解决了什么问题，不修改措辞。</span>
                <span class="step-two">把这 2 句话整理成一句项目定位，不追求完美。</span>
              </div>
              <div class="primary-button">
                <span class="button-start">
                  <svg class="svg-icon play-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7-11-7Z" />
                  </svg>
                  开始执行
                </span>
                <span class="button-complete">
                  <svg class="svg-icon play-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M9 12.5 11.2 15 16 9" />
                    <circle cx="12" cy="12" r="8.5" />
                  </svg>
                  完成当前步骤
                </span>
                <span class="button-next">
                  <svg class="svg-icon play-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7-11-7Z" />
                  </svg>
                  进入下一步
                </span>
              </div>
            </article>

            <div class="progress">
              <div class="progress-left">
                <svg class="svg-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M3 12a9 9 0 1 0 3-6.7" />
                  <path d="M3 4v5h5" />
                  <path d="M12 7v5l3 2" />
                </svg>
                <div>
                  <div class="progress-label">进度记录</div>
                  <div class="progress-count">
                    <span class="count-zero">已完成 0 步</span>
                    <span class="count-one">已完成 1 步</span>
                  </div>
                </div>
              </div>
              <div class="progress-right">
                <span>暂无记录</span>
                <svg class="svg-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="m9 18 6-6-6-6" />
                </svg>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

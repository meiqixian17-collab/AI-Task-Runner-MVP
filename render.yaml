services:
  - type: web
    name: ai-task-runner-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_API_URL
        value: https://api.deepseek.com/chat/completions
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
